services:
  postgres:
    image: postgres:16-alpine
    container_name: avantpro-po-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: avantpro
      POSTGRES_PASSWORD: avantpro
      POSTGRES_DB: avantpro_po
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avantpro -d avantpro_po"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: avantpro-po-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: avantpro-po-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://avantpro:avantpro@postgres:5432/avantpro_po?schema=public
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: avantpro-po-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_WS_URL: http://localhost:3001
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/index.html:/app/apps/web/index.html

volumes:
  postgres_data:
